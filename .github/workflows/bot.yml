name: Trading Bot — Signal Scan + Auto-Trade

on:
  # Triggered by cron-job.org every 5 minutes via GitHub API
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — scan but do NOT place trades or send emails'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

  # GitHub's own scheduler as a fallback (less reliable for 5-min intervals)
  schedule:
    - cron: '*/5 * * * *'

jobs:
  scan:
    name: Signal Scan + Trade
    runs-on: ubuntu-latest

    # 20 minutes: covers cold pip install (~4 min) + scan + 5-min trade wait + result + email
    # After first run, pip cache cuts install to ~30s, so typical runs finish in ~8 min
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal scan
        env:
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:   ${{ secrets.EMAIL_RECIPIENT }}
          ACCOUNT_BALANCE:   ${{ secrets.ACCOUNT_BALANCE }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          IQ_EMAIL:          ${{ secrets.IQ_EMAIL }}
          IQ_PASSWORD:       ${{ secrets.IQ_PASSWORD }}
          IQ_DEMO:           ${{ secrets.IQ_DEMO }}
          TRADE_LOG_GIST_ID: ${{ secrets.TRADE_LOG_GIST_ID }}
          GIST_TOKEN:        ${{ secrets.GIST_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python run_scan.py --dry-run
          else
            python run_scan.py
          fi

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: logs/
          retention-days: 3
          if-no-files-found: ignore
