name: Trading Bot Signal Scan

on:
  # Triggered by cron-job.org every 5 minutes via GitHub API
  # This is more reliable than GitHub's built-in scheduler
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — scan but do NOT send emails'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

  # Keep GitHub's own scheduler as a fallback (runs less reliably)
  schedule:
    - cron: '*/5 * * * *'

jobs:
  scan:
    name: Signal Scan
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal scan
        env:
          EMAIL_SENDER:     ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:  ${{ secrets.EMAIL_RECIPIENT }}
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          ACCOUNT_BALANCE:  ${{ secrets.ACCOUNT_BALANCE }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python run_scan.py --dry-run
          else
            python run_scan.py
          fi

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: logs/
          retention-days: 3
          if-no-files-found: ignore
